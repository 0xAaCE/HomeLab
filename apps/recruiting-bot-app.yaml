apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: recruiting-bot
    namespace: argocd
spec:
    project: default
    source:
        repoURL: git@github.com:0xAaCE/recruiting-bot.git
        targetRevision: dev
        path: ops/k8s/base
    destination:
        server: https://kubernetes.default.svc
        namespace: recruiting-bot
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
        retry:
            limit: 3
            backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
    ignoreDifferences:
        - group: ""
          kind: Secret
          name: infisical-auth
